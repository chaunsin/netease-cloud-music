# 本文件包含所有可用的配置选项及其默认值（在注释中说明）。
# 详情参考: https://github.com/golangci/golangci-lint/blob/main/.golangci.reference.yml
version: "2"

linters:
  # 默认的 linter 集合。
  # 取值可以是：
  # - `standard`："默认" linters https://golangci-lint.run/docs/linters/#all-linters
  # - `all`：默认启用所有 linters。
  # - `none`：默认禁用所有 linters。
  # - `fast`：仅启用被视为"快速"的 linters（`golangci-lint help linters --json | jq '[ .[] | select(.fast==true) ] | map(.name)'`）。
  # 默认值：standard
  default: all

  # 禁用特定的 linters。
  disable:
    - cyclop # 圈复杂度（执行路径）
    - contextcheck # 存在争议 
    - err113 # 不能定义局部错误只能定期全局变量方式
    - ireturn # 存在误报
    - interfacebloat #接口定义允许的最大方法数
    - gochecknoinits # 检查是否使用了init方法
    - gocognit # 代码认知复杂度
    - goconst # 常量枚举检测，存在很多冲突误报情况
    - gocyclo # 圈复杂度
    - godox # 代码TODO、FIXME等注释，有些情况下需要滞后处理，为了保证issues问题为0开启后AI会绕过把关键字修改成别的比如pending等，因此需要关闭
    - gochecknoglobals # 禁止定义全局变量（global variables）。
    - goheader # 限制文件头Lisense目前存在覆盖其它协议问题暂时注释，可配置忽略指定文件
    - gomodguard # 弃用使用gomodguard_v2版本
    - gosmopolitan
    - lll # 限制单行代码长度
    - mnd
    - maintidx # 可维护性指数
    - nestif # 控制if复杂度
    - noctx # 检查是否有携带context，对网络相关操作。注意有些场景为了实现context会存在不够优化情况视情况而定
    - noinlineerr #一个禁止使用内联错误处理的 Go 代码检查工具
    - nlreturn # 在 return 语句前增加一个空行（newline before return）。
    - tagliatelle # 结构体tag配置,推荐新项目使用，如果对接外部接口存在不符合标准问题则不能使用了
    - testpackage # 测试文件package命名规范是否携带_test,如果开启则不能测试私有变量和方法了。
    - varnamelen # 变量长度控制,有些情况下变量名称单个字母表达意思更简洁清晰，如果配置长度配置成1则相当于关闭意义了因此此处关闭
    - wsl # 旧版规则
    - wrapcheck # 错误包装
    # - unparam # 找出函数中"没有实际作用"的参数（parameter）和返回值（return value）。注意容易误报酌情配置,在代码重构场景、新项目场景推荐配置
    # - containedctx # context是否存在结构体中规则检测，虽然官方建议但有些情况下ctx需要在struct中存在因此需要忽略此规则，也存在争议。

  # 特定 linters 的所有可用设置。
  settings:
    asasalint:
      # 指定要排除的一组函数名。
      # 这些值会与内置排除项合并。
      # 可通过将 `use-builtin-exclusions` 设置为 `false` 来禁用内置排除项。
      # 默认值：["^(fmt|log|logger|t|)\.(Print|Fprint|Sprint|Fatal|Panic|Error|Warn|Warning|Info|Debug|Log)(|f|ln)$"]
      exclude:

      # 启用/禁用 asasalint 的函数名内置排除项。
      # 参见 `exclude` 的默认值以获取内置排除项。
      # 默认值：true
      use-builtin-exclusions: true

    bidichk:
      # 以下配置用于检查所有提到的不可见 Unicode 字符。
      # 所有字符默认启用。
      left-to-right-embedding: false
      right-to-left-embedding: false
      pop-directional-formatting: false
      left-to-right-override: false
      right-to-left-override: false
      left-to-right-isolate: false
      right-to-left-isolate: false
      first-strong-isolate: false
      pop-directional-isolate: false

    bodyclose:
      # 检查响应体是否已被消费。
      # 存在误报。
      # 默认值：false
      check-consumption: false

    copyloopvar:
      # 检查所有将循环变量赋值给另一个变量的情况。
      # 默认值：false
      check-alias: false

    # 圈复杂度（执行路径）
    cyclop:
      # 报告的最大代码复杂度。
      # 默认值：10
      max-complexity: 12
      # 最大平均包复杂度。
      # 如果大于 0.0（浮点数）则启用检查。
      # 默认值：0.0
      package-average: 8

    decorder:
      # 文件内 `type`、`const`、`var` 和 `func` 声明所需的顺序。
      # 默认值：类型在常量之前，常量在变量之前，变量在函数之前。
      dec-order:
        - type
        - const
        - var
        - func

      # 如果为 true，下划线变量（名称为 "_" 的变量）在所有检查中都会被忽略。
      # 默认值：false（不忽略下划线变量）
      ignore-underscore-vars: false

      # 如果为 true，则完全不检查声明顺序。
      # 默认值：true（禁用）
      disable-dec-order-check: true

      # 如果为 true，`init` 函数可以在文件中的任意位置（不必声明在所有其他函数之前）。
      # 默认值：true（禁用）
      disable-init-func-first-check: true

      # 如果为 true，允许多个全局 `type`、`const` 和 `var` 声明。
      # 默认值：true（禁用）
      disable-dec-num-check: true

      # 如果为 true，类型声明在声明数量检查时将被忽略。
      # 默认值：false（不忽略类型声明）
      disable-type-dec-num-check: false

      # 如果为 true，常量声明在声明数量检查时将被忽略。
      # 默认值：false（不忽略常量声明）
      disable-const-dec-num-check: false

      # 如果为 true，变量声明在声明数量检查时将被忽略。
      # 默认值：false（不忽略变量声明）
      disable-var-dec-num-check: false

    depguard:
      # 要应用的规则。
      #
      # 变量：
      # - 文件变量
      #   使用感叹号 `!` 来否定一个变量。
      #   例如：`!$test` 匹配任何不是 go 测试文件的文件。
      #
      #   `$all` - 匹配所有 go 文件
      #   `$test` - 匹配所有 go 测试文件
      #
      # - 包变量
      #
      #   `$gostd` - 匹配所有 go 标准库（从 `GOROOT` 获取）
      #
      # 默认值（未定义自定义规则时适用）：所有文件中只允许 $gostd。
      rules:
        # 规则名称。
        main:
          # 定义包匹配行为。可用模式：
          # - `original`：如果不匹配拒绝列表，且匹配允许列表或允许列表为空，则允许。
          # - `strict`：仅当匹配允许列表，且不匹配拒绝列表或允许规则更具体（更长）时才允许。
          # - `lax`：如果不匹配拒绝列表，或允许规则更具体（更长）时允许。
          # 默认值："original"
          list-mode: lax
          # 将匹配此设置列表的文件 glob 列表，用于比较。
          # 默认情况下，如果路径是相对路径，则相对于执行 golangci-lint 命令的目录。
          # 占位符 '${base-path}' 会被替换为相对于 `run.relative-path-mode` 所定义模式的路径。
          # 占位符 '${config-path}' 会被替换为相对于配置文件的路径。
          # 默认值：$all
          files:

          # 允许的包列表。
          # 条目可以是变量（以 $ 开头）、字符串前缀或精确匹配（以 $ 结尾）。
          # 默认值：[]
          allow:

          # 不允许的包列表。
          # 条目可以是变量（以 $ 开头）、字符串前缀或精确匹配（以 $ 结尾）。
          # 默认值：[]
          deny:
            - pkg: "math/rand$"
              desc: use math/rand/v2
            - pkg: "github.com/sirupsen/logrus"
              desc: not allowed
            - pkg: "github.com/pkg/errors"
              desc: Should be replaced by standard lib errors package

    # 检查赋值语句中是否存在过多的空白标识符（例如 x, _, _, _, := f()）。
    dogsled:
      # 检查有过多空白标识符的赋值。
      # 默认值：2
      max-blank-identifiers: 3

    # 检测重复代码
    dupl:
      # 触发问题的 token 数量。
      # 默认值：150
      threshold: 150

    dupword:
      # 用于检测重复单词的关键词。
      # 如果此列表不为空，则仅检测此列表中定义的单词。
      # 默认值：[]
      keywords:
        - "the"
        - "and"
        - "a"
      # 用于忽略检测的关键词。
      # 默认值：[]
      ignore:

      # 仅检查注释，跳过字符串。
      # 默认值：false
      comments-only: false

    # 限制匿名嵌入字段在 struct 中的排列格式
    embeddedstructfieldcheck:
      # 检查嵌入字段和常规字段之间是否有空行。
      # 默认值：true
      empty-line: true
      # 检查 sync.Mutex 和 sync.RWMutex 是否未用作嵌入字段。
      # 默认值：false
      forbid-mutex: true

    errcheck:
      # 报告类型断言中未检查错误的情况：`a := b.(MyStruct)`。
      # 此类情况默认不报告。
      # 默认值：false
      check-type-assertions: true

      # 报告将错误赋值给空白标识符的情况：`num, _ := strconv.Atoi(numStr)`。
      # 此类情况默认不报告。
      # 默认值：false
      check-blank: false

      # 禁用 errcheck 内置排除列表。
      # 详情参见 https://github.com/kisielk/errcheck#excluding-functions 中的 `-excludeonly` 选项。
      # 默认值：false
      disable-default-exclusions: false

      # 要从检查中排除的函数列表，每个条目是一个要排除的单个函数。
      # 详情参见 https://github.com/kisielk/errcheck#excluding-functions。
      exclude-functions:
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        - (*os.File).Close
        - (*bytes.Buffer).Write
        - (*go.uber.org/zap.Logger).Sync
        - (*go.uber.org/zap.SugaredLogger).Sync

      # 显示函数签名而非选择器。
      # 默认值：false
      verbose: true

    errchkjson:
      # 当 check-error-free-encoding 设置为 true 时，errchkjson 会对来自 json 编码函数的错误发出警告，
      # 这些错误可以安全地忽略，因为它们不可能发生。
      #
      # 如果 check-error-free-encoding 设置为 true 且启用了 errcheck linter，
      # 建议添加以下例外以防止误报：
      #
      #     linters:
      #       settings:
      #         errcheck:
      #           exclude-functions:
      #             - encoding/json.Marshal
      #             - encoding/json.MarshalIndent
      #
      # 默认值：false
      check-error-free-encoding: false

      # 对没有导出字段的结构体编码发出报告。
      # 默认值：false
      report-no-exported: false

    errorlint:
      # 检查 fmt.Errorf 是否使用 %w 动词来格式化错误。
      # 注意事项参见 https://github.com/polyfloyd/go-errorlint。
      # 默认值：true
      errorf: true
      # 允许超过 1 个 %w 动词，Go 1.20 起有效（需要 `errorf: true`）。
      # 默认值：true
      errorf-multi: false
      # 检查普通类型断言和类型 switch。
      # 默认值：true
      asserts: true
      # 检查普通错误比较。
      # 默认值：true
      comparison: true
      # 允许的错误。
      # 默认值：[]
      allowed-errors:
        - err: "io.EOF"
          fun: "example.com/pkg.Read"
      # 允许的错误"通配符"。
      # 默认值：[]
      allowed-errors-wildcard:
        - err: "example.com/pkg.ErrMagic"
          fun: "example.com/pkg.Magic"

    exhaustive:
      # 检查穷举性的程序元素。
      # 默认值：[ switch ]
      check:
        - switch
        - map
      # switch 语句中存在 "default" 分支即满足穷举性，
      # 即使未列出所有枚举成员。
      # 默认值：false
      default-signifies-exhaustive: true
      # 匹配所提供正则表达式的枚举成员不必列在
      # switch 语句中即可满足穷举性。
      # 默认值：""
      ignore-enum-members: ""
      # 匹配所提供正则表达式的枚举类型不必列在
      # switch 语句中即可满足穷举性。
      # 默认值：""
      ignore-enum-types: ""
      # 仅在包作用域中考虑枚举，不在内部作用域中考虑。
      # 默认值：false
      package-scope-only: true
      # 仅对带有 "//exhaustive:enforce" 注释的 switch 运行穷举检查。
      # 默认值：false
      explicit-exhaustive-switch: false
      # 仅对带有 "//exhaustive:enforce" 注释的 map 字面量运行穷举检查。
      # 默认值：false
      explicit-exhaustive-map: false
      # switch 语句即使穷举也要求有 default 分支。
      # 默认值：false
      default-case-required: false

    exhaustruct:
      # 需要处理的类型名称的正则表达式列表。
      # 匿名结构体可以通过 '<anonymous>' 别名匹配。
      #
      # 每个正则表达式必须匹配完整的类型名称，包括包路径。
      # 例如，要匹配类型 `net/http.Cookie`，正则表达式应为 `.*/http\.Cookie`，
      # 而不是 `http\.Cookie`。
      # 默认值：[]
      include:
        - '.+\.Test'
        - 'example\.com/package\.ExampleStruct[\d]{1,2}'
      # 要从处理中排除的类型名称的正则表达式列表。
      # 匿名结构体可以通过 '<anonymous>' 别名匹配。
      # 优先级高于 `include`。
      # 每个正则表达式必须匹配完整的类型名称，包括包路径。
      # 例如，要匹配类型 `net/http.Cookie`，正则表达式应为 `.*/http\.Cookie`，
      # 而不是 `http\.Cookie`。
      # 默认值：[]
      exclude:
  
      # 允许空结构体，实际上是将其从检查中排除。
      # 默认值：false
      allow-empty: false

      # 允许为空的类型名称的正则表达式列表。
      # 匿名结构体可以通过 '<anonymous>' 别名匹配。
      # 每个正则表达式必须匹配完整的类型名称，包括包路径。
      # 例如，要匹配类型 `net/http.Cookie`，正则表达式应为 `.*/http\.Cookie`，
      # 而不是 `http\.Cookie`。
      # 默认值：[]
      allow-empty-rx:
        - '.*/http\.Cookie'

      # 允许在 return 语句中使用空结构体。
      # 默认值：false
      allow-empty-returns: false

      # 允许在变量声明中使用空结构体。
      # 默认值：false
      allow-empty-declarations: false

    fatcontext:
      # 检查结构体指针中潜在的 fat context。可能产生误报。
      # 默认值：false
      check-struct-pointers: false

    forbidigo:
      # 禁止以下标识符（正则表达式列表）。
      # 默认值：["^(fmt\\.Print(|f|ln)|print|println)$"]
      forbid:
        # 内置引导函数。
        - pattern: ^print(ln)?$
        # 可选的消息，将包含在错误报告中。
        - pattern: ^fmt\.Print.*$
          msg: Do not commit print statements.
        # 或者，将消息放在正则表达式的末尾，用 `(# )?` 包围。
        # 转义任何特殊字符。这些消息将包含在错误报告中。
        - pattern: 'fmt\.Print.*(# Do not commit print statements\.)?'
        # 禁止 spew Dump，无论是作为函数还是方法调用。
        # 依赖于下方的 analyze-types。
        - pattern: ^spew\.(ConfigState\.)?Dump$
        # 包名可能有歧义。
        # 可以使用完整的导入路径作为附加条件。
        # 依赖于下方的 analyze-types。
        - pattern: ^v1.Dump$
          pkg: ^example.com/pkg/api/v1$

      # 从 forbidigo 检查中排除 godoc 示例。
      # 默认值：true
      exclude-godoc-examples: false
      
      # 不是匹配字面源代码，
      # 而是使用类型信息将表达式替换为包含包名的字符串
      # 以及（对于方法和字段）类型名。
      # 这使得处理导入重命名以及禁止结构体字段和方法成为可能。
      # 默认值：false
      analyze-types: true

    funcorder:
      # 检查构造函数是否放置在结构体声明之后。
      # 默认值：true
      constructor: true
      # 检查结构体的导出方法是否放置在非导出方法之前。
      # 默认值：true
      struct-method: true
      # 检查构造函数和/或结构体方法是否按字母顺序排序。
      # 默认值：false
      alphabetical: false
      # 检查导出函数是否放置在非导出函数之前。
      # 默认值：false
      function: true

    funlen:
      # 检查函数中的行数。
      # 如果小于 0，则禁用此检查。
      # 默认值：60
      lines: -1
      # 检查函数中的语句数。
      # 如果小于 0，则禁用此检查。
      # 默认值：40
      statements: -1
      # 计算行数时忽略注释。
      # 默认值：true
      ignore-comments: true

    # https://github.com/onsi/ginkgo BDD测试框架
    ginkgolinter:
      # 抑制错误的长度断言警告。
      # 默认值：false
      suppress-len-assertion: true

      # 抑制错误的 nil 断言警告。
      # 默认值：false
      suppress-nil-assertion: true

      # 抑制错误的 error 断言警告。
      # 默认值：false
      suppress-err-assertion: true

      # 抑制错误的比较断言警告。
      # 默认值：false
      suppress-compare-assertion: true

      # 抑制异步断言中的函数调用警告。
      # 默认值：false
      suppress-async-assertion: true

      # 抑制比较不同类型值（如 `int32` 和 `uint32`）的警告。
      # 默认值：false
      suppress-type-compare-assertion: true

      # 对 ginkgo focus 容器（如 `FDescribe`、`FContext`、`FWhen` 或 `FIt`）触发警告。
      # 默认值：false
      forbid-focus-container: true

      # 不对 HaveLen(0) 触发警告
      # 默认值：false
      allow-havelen-zero: true

      # 强制使用 `Expect` 配合 `To`、`ToNot` 或 `NotTo`。
      # 拒绝使用 `Expect` 配合 `Should` 或 `ShouldNot`。
      # 默认值：false
      force-expect-to: true

      # 尽力验证异步间隔（超时和轮询）。
      # 如果 `suppress-async-assertion` 为 true 则忽略。
      # 默认值：false
      validate-async-intervals: true

      # 对在 ginkgo 容器（如 `Describe`、`Context` 和 `When`）中的变量赋值触发警告，而不是在 `BeforeEach()` 中。
      # 默认值：false
      forbid-spec-pollution: true

      # 强制对 error 函数使用 Succeed 匹配器，对非函数 error 值使用 HaveOccurred 匹配器。
      # 默认值：false
      force-succeed: true

      # 强制向 gomega 匹配器添加断言描述。
      # 默认值：false
      force-assertion-description: true

      # 强制使用 `ToNot`、`ShouldNot` 而不是 `To(Not())`。
      # 默认值：false
      force-tonot: true

    gochecksumtype:
      # 如果未列出所有成员，switch 语句中存在 `default` 分支即满足穷举性。
      # 默认值：true
      default-signifies-exhaustive: true
      # 在穷举性检查中包含共享接口。
      # 默认值：false
      include-shared-interfaces: true

    # 代码认知复杂度（Cognitive Complexity）简单来说一个开发者阅读这段代码，需要花费多少脑力去理解它。
    gocognit:
      # 报告的最小代码复杂度。
      # 默认值：30（但建议使用 10-20）
      min-complexity: 15

    # const配置
    goconst:
      # 字符串常量的最小长度。
      # 默认值：3
      min-len: 2
      # 触发问题的常量字符串最小出现次数。
      # 默认值：3
      min-occurrences: 2
      # 查找与值匹配的现有常量。
      # 默认值：true
      match-constant: true
      # 同时搜索重复的数字。
      # 默认值：false
      numbers: true
      # 最小值，仅与 `goconst.numbers` 一起使用。
      # 默认值：3
      min: 2
      # 最大值，仅与 `goconst.numbers` 一起使用。
      # 默认值：3
      max: 2
      # 当常量未用作函数参数时忽略。
      # 默认值：true
      ignore-calls: true
      # 排除匹配给定正则表达式的字符串。
      # 默认值：""
      ignore-string-values:
        - 'foo.+'
      # 检测具有相同值的常量。
      # 默认值：false
      find-duplicates: true
      # 评估常量表达式，如 Prefix + "suffix"。
      # 默认值：false
      eval-const-expressions: true
      # 忽略测试文件中的字符串。
      # 默认值：false
      ignore-tests: true
      # 忽略对这些函数的调用中的字符串字面量
      # 默认值：空列表
      ignore-functions:
        - log.Info
        - slog.Warn
        - fmt.Errorf

    gocritic:
      # 启用所有检查。
      # 检查列表为 (https://go-critic.com/overview#checks-overview)
      # 默认值：false
      enable-all: true
      # 应禁用哪些检查；不能与 'enabled-checks' 同时使用。
      # 默认值：[]
      disabled-checks:
        - unnamedResult # 当函数返回多个值，或者返回值含义不够直观时，建议使用命名返回值（named result）来表达语义
        - commentedOutCode # 检测注释中是否包含"被注释掉的代码"（commented-out code）。
        - unnecessaryBlock

      # 除了默认检查外，按标签启用多个检查。
      # 运行 `GL_DEBUG=gocritic golangci-lint run --enable=gocritic` 查看所有标签和检查。
      # 参见 https://github.com/go-critic/go-critic#usage -> "Tags" 部分。
      # 默认值：[]
      enabled-tags:

      disabled-tags:

      # 传递给 gocritic 的设置。
      # 设置键是受支持的 gocritic 检查器的名称。
      # 受支持的检查器列表可在 https://go-critic.com/overview 找到。
      settings:
        # 必须是有效的已启用检查名称。
        captLocal:
          # 是否将检查器限制为仅参数。
          # 默认值：true
          paramsOnly: true
        # commentedOutCode:
        #   # 触发警告的注释最小长度。
        #   # 默认值：15
        #   minLength: 15
        elseif:
          # 是否跳过平衡的 if-else 对。
          # 默认值：true
          skipBalanced: true
        hugeParam:
          # 触发警告的字节大小。
          # 默认值：80
          sizeThreshold: 80
        ifElseChain:
          # 触发警告的 if-else 块最小数量。
          # 默认值：2
          minThreshold: 2
        nestingReduce:
          # 触发警告的分支内语句最小数量。
          # 默认值：5
          bodyWidth: 5
        rangeExprCopy:
          # 触发警告的字节大小。
          # 默认值：512
          sizeThreshold: 512
          # 是否检查测试函数
          # 默认值：true
          skipTestFuncs: true
        rangeValCopy:
          # 触发警告的字节大小。
          # 默认值：128
          sizeThreshold: 128
          # 是否检查测试函数。
          # 默认值：true
          skipTestFuncs: true
        ruleguard:
          # 启用调试以识别哪个 'Where' 条件被拒绝。
          # 该参数的值是 ruleguard 文件中的函数名。
          #
          # 当规则被评估时：
          # 如果：
          #   Match() 子句被接受；且
          #   Where() 子句中的某个条件被拒绝，
          # 那么：
          #   ruleguard 会打印被拒绝的具体 Where() 条件。
          #
          # 该选项传递给 ruleguard 的 'debug-group' 参数。
          # 默认值：""
          debug: ''
          # 确定解析 ruleguard 文件时发生错误的行为。
          # 如果未设置此标志，则记录错误并跳过包含错误的规则文件。
          # 如果设置此标志，则值必须为逗号分隔的错误条件列表。
          # - 'all'：    对所有错误失败。
          # - 'import'：ruleguard 规则导入了无法找到的包。
          # - 'dsl'：    gorule 文件不符合 ruleguard DSL。
          # 默认值：""
          failOn: all
          # 包含 ruleguard 规则的文件路径的逗号分隔列表。
          # 默认情况下，如果路径是相对路径，则相对于执行 golangci-lint 命令的目录。
          # 占位符 '${base-path}' 被替换为相对于 `run.relative-path-mode` 所定义模式的路径。
          # 占位符 '${config-path}' 被替换为相对于配置文件的路径。
          # 可以指定 glob 模式，如 'rules-*.go'。
          # 默认值：""
          rules: ''
          # 启用组的逗号分隔列表，留空则启用所有。
          # 标签可以用 # 字符前缀定义。
          # 默认值："<all>"
          enable: ""
          # 禁用组的逗号分隔列表，留空则启用所有。
          # 标签可以用 # 字符前缀定义。
          # 默认值：""
          disable: ""
        tooManyResultsChecker:
          # 最大结果数。
          # 默认值：5
          maxResults: 5
        truncateCmp:
          # 是否跳过 int/uint/uintptr 类型。
          # 默认值：true
          skipArchDependent: true
        underef:
          # 是否跳过 (*x).method() 调用（其中 x 是指针接收者）。
          # 默认值：true
          skipRecvDeref: true
        # unnamedResult:
        #   # 是否检查导出函数。
        #   # 默认值：false
        #   checkExported: false

    # 检查 圈复杂度（Cyclomatic Complexity）gocyclo 是早期版本的圈复杂度检查器，cyclop 是它的增强替代品。
    gocyclo:
      # 报告的最小代码复杂度。
      # 默认值：30（但建议使用 10-20）
      min-complexity: 30

    # 控制godoc文档规范
    godoclint:
      # 默认启用的规则集。
      # 可选值为：`basic`、`all` 或 `none`。
      # 默认值：`basic`（启用 `pkg-doc`、`single-pkg-doc`、`start-with-name` 和 `deprecated`）
      default: basic

      # 要禁用的规则列表。
      # 默认值：空
      disable:

      # 用于微调单个规则的映射。
      # 所有子键都是可选的。
      options:
        max-len:
          # godoc 的最大行长度，不包括 `//`、`/*` 或 `*/` 标记。
          # 默认值：77
          length: 128

        require-doc:
          # 应用 `require-doc` 规则时忽略导出（公开）符号。
          # 默认值：false
          ignore-exported: true

          # 应用 `require-doc` 规则时忽略非导出（私有）符号。
          # 默认值：true
          ignore-unexported: false

        start-with-name:
          # 应用 `start-with-name` 规则时包含非导出符号。
          # 默认值：false
          include-unexported: true

    # 注释检查
    godot:
      # 要检查的注释：`declarations`、`toplevel`、`noinline` 或 `all`。
      # 默认值：declarations
      scope: declarations
      # 用于从检查中排除特定注释行的正则表达式列表。
      # 默认值：[]
      exclude:
        # 排除 todo 和 fixme 注释。
        - "^fixme:"
        - "^todo:"
        - "^note:"
        - "^bug:"
      # 检查每个句子是否以句号结尾。
      # 默认值：true
      period: true
      # 检查每个句子是否以大写字母开头。
      # 默认值：false
      capital: false

    # 检测代码中TODO、BUG、FIXME等关键注释
    godox:
      # 报告以关键字开头的注释，这对于可能被意外留在代码中、
      # 应在合并前解决的 TODO 或 FIXME 注释很有用。
      # 默认值：["TODO", "BUG", "FIXME"]
      keywords:
        - TODO
        - BUG
        - FIXME
        - NOTE
        - OPTIMIZE # 标记在合并前应优化的代码
        - HACK # 标记在合并前应移除的临时变通方案

    # 文件头部License设置. 问题: 如果copy了别人得代码会覆盖当执行时会覆盖掉对应的License设置，可以通过exclusions.paths配置忽略。
    goheader:
      # 支持两种类型：'const` 和 `regexp`。
      # 值可以递归使用。
      # 默认值：{}
      values:
        const:
          # 在此处定义 const 类型值，格式为 k:v。
          COMPANY: Copyright (c)
          AUTHOR: chaunsin
      # 用于检查的模板。
      # 在此处放置源代码文件的版权头模板。
      # 注意：{{ YEAR }} 是一个内置值，返回相对于当前机器时间的年份。
      # 默认值：""
      template: |-
        {{ COMPANY }} {{ YEAR }} {{ AUTHOR }}
        SPDX-License-Identifier: MIT
        
      # 作为 'template' 指令的替代方案，可以指定包含模板源的文件路径。
      # 如果需要从特定文件加载模板则很有用。
      # 默认情况下，如果路径是相对路径，则相对于执行 golangci-lint 命令的目录。
      # 占位符 '${base-path}' 被替换为相对于 `run.relative-path-mode` 所定义模式的路径。
      # 占位符 '${config-path}' 被替换为相对于配置文件的路径。
      # 默认值：""
      template-path: ”“

    # go.mod管理
    gomoddirectives:
      # 允许本地 `replace` 指令。
      # 默认值：false
      replace-local: false
      # 允许的 `replace` 指令列表。
      # 默认值：[]
      replace-allow-list:
   
      # 允许在 `retract` 指令中不解释版本被撤回的原因。
      # 默认值：false
      retract-allow-no-explanation: false
      # 禁止使用 `exclude` 指令。
      # 默认值：false
      exclude-forbidden: false
      # 禁止使用 `ignore` 指令（>= go1.25）。
      # 默认值：false
      ignore-forbidden: false
      # 禁止使用 `toolchain` 指令。
      # 默认值：false
      toolchain-forbidden: false
      # 定义用于验证 `toolchain` 指令的模式。
      # 默认值：'' (no match)
      toolchain-pattern: 'go1\.23\.\d+$'
      # 禁止使用 `tool` 指令。
      # 默认值：false
      tool-forbidden: false
      # 禁止使用 `godebug` 指令。
      # 默认值：false
      go-debug-forbidden: false
      # 定义用于验证 `go` 最低版本指令的模式。
      # 默认值：'' (no match)
      go-version-pattern: '\d\.\d+(\.0)?'
      # 检查模块路径的有效性。
      # 默认值：false
      check-module-path: false

    gomodguard_v2:
      # 阻止使用本地文件系统路径的 'replace' 指令
      # 默认值：false
      local-replace-directives: false
      # 允许的模块列表。
      allowed:
      # 阻止的模块列表。
      blocked:

    # 代码安全检测
    gosec:
      # 选择要运行的规则子集。
      # 可用规则：https://github.com/securego/gosec#available-rules
      # 默认值：[] - 表示包含所有规则
      includes:

      # 指定要显式排除的规则集。
      # 可用规则：https://github.com/securego/gosec#available-rules
      # 默认值：[]
      excludes:
        - G115 # Integer overflow conversion (uint64 -> int64)
        - G117 # 检测"敏感字段被序列化"
        - G124 # 检测 cookie 缺安全属性
        - G304 # 使用变量作为文件路径打开文件，可能导致任意文件读取
        - G402 # InsecureSkipVerify
        - G404 # 使用了若安全随机数生成器 (math/rand or math/rand/v2 instead of crypto/rand)

      # 过滤掉严重程度低于给定值的问题。
      # 有效选项为：low、medium、high。
      # 默认值：low
      severity: medium

      # 过滤掉置信度低于给定值的问题。
      # 有效选项为：low、medium、high。
      # 默认值：low
      confidence: medium

      # 并发值。
      # 默认值：当前进程可用的逻辑 CPU 数量。
      concurrency: 12

      # 指定规则的配置。
      config:
        # 全局设置适用于所有规则。
        global:
          # 如果为 true，则忽略注释中的 #nosec（以及替代前缀）。
          # 默认值：false
          nosec: false
          # 为 #nosec 添加替代注释前缀（两者同时生效）。
          # 默认值：""
          "#nosec": ""
          # 定义 nosec 问题是否计为发现结果。
          # 默认值：false
          show-ignored: false
          # 审计模式启用额外检查，这些检查对于普通代码分析可能过于繁琐。
          # 默认值：false
          audit: false
        G101:
          # 用于查找变量和常量的正则表达式模式。
          # 默认值："(?i)passwd|pass|password|pwd|secret|token|pw|apiKey|bearer|cred"
          pattern: ""
          # 如果为 true，则对所有情况都报告（即使是低熵的）。
          # 默认值：false
          ignore_entropy: false
          # 字符串的最大允许熵值。
          # 默认值："80.0"
          entropy_threshold: "80.0"
          # 熵/字符串长度的最大允许值。
          # 当熵 >= entropy_threshold/2 时生效。
          # 默认值："3.0"
          per_char_threshold: "3.0"
          # 计算字符串前 N 个字符的熵。
          # 默认值："16"
          truncate: "32"
        # 检查未处理错误时要忽略的附加函数。
        # 以下函数始终被忽略：
        #   bytes.Buffer:
        #     - Write
        #     - WriteByte
        #     - WriteRune
        #     - WriteString
        #   fmt:
        #     - Print
        #     - Printf
        #     - Println
        #     - Fprint
        #     - Fprintf
        #     - Fprintln
        #   strings.Builder:
        #     - Write
        #     - WriteByte
        #     - WriteRune
        #     - WriteString
        #   io.PipeWriter:
        #     - CloseWithError
        #   hash.Hash:
        #     - Write
        #   os:
        #     - Unsetenv
        # 默认值：{}
        G104:
          fmt:
            - Fscanf
        G111:
          # 用于查找潜在目录遍历的正则表达式模式。
          # 默认值："http\\.Dir\\(\"\\/\"\\)|http\\.Dir\\('\\/'\\)"
          pattern: "custom\\.Dir\\(\\)"
        # os.Mkdir 和 os.MkdirAll 的最大允许权限模式。
        # 默认值："0750"
        G301: "0750"
        # os.OpenFile 和 os.Chmod 的最大允许权限模式。
        # 默认值："0600"
        G302: "0600"
        # os.WriteFile 和 ioutil.WriteFile 的最大允许权限模式。
        # 默认值："0600"
        G306: "0600"

    gosmopolitan:
      # 允许并忽略 `time.Local` 的使用。
      #
      # 默认值：false
      allow-time-local: true
      # 以 `full/pkg/path.name` 形式表示的完全限定名称列表，作为"i18n 逃逸口"。
      # 对这些名称的调用类表达式中的字符串字面量，或这些名称的结构体字面量，
      # 豁免书写系统检查。
      #
      # 默认值：[]
      escape-hatches:
      # 要监控在字符串字面量中使用的 Unicode 脚本列表。
      # https://pkg.go.dev/unicode#pkg-variables
      #
      # 默认值：["Han"]
      watch-for-scripts:

    govet:
      # 启用所有分析器。
      # 默认值：false
      enable-all: true
      # 按名称禁用分析器。
      # （除了默认的
      #   atomicalign, deepequalerrors, fieldalignment, findcall, nilness, reflectvaluecompare, shadow, sortslice,
      #   timeformat, unusedwrite
      # )。
      # 运行 `GL_DEBUG=govet golangci-lint run --enable=govet` 查看默认、所有可用和已启用的分析器。
      # 默认值：[]
      disable:
       - fieldalignment # 会根据字段大小和对齐要求调整声明顺序，试图减少结构体 padding。

      # 每个分析器的设置。
      settings:
        # 分析器名称，运行 `go tool vet help` 查看所有分析器。
        printf:
          # 要检查的 print 函数名称的逗号分隔列表（除默认外，参见 `go tool vet help printf`）。
          # 默认值：[]
          funcs:
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Fatalf
        shadow:
          # 是否对变量遮蔽严格检查；可能产生较多噪音。
          # 默认值：false
          strict: false
        unusedresult:
          # 结果必须被使用的函数的逗号分隔列表。
          # （除默认外：
          #   context.WithCancel, context.WithDeadline, context.WithTimeout, context.WithValue, errors.New, fmt.Errorf,
          #   fmt.Sprint, fmt.Sprintf, sort.Reverse
          # )。
          # 默认值：[]
          funcs:

          # 类型为 func() string 的方法名称的逗号分隔列表，其结果必须被使用。
          # （除默认的 Error、String 外）。
          # 默认值：[]
          stringmethods:

    grouper:
      # 要求仅使用单个全局 'const' 声明。
      # 默认值：false
      const-require-single-const: false
      # 要求使用分组的全局 'const' 声明。
      # 默认值：false
      const-require-grouping: false

      # 要求仅使用单个 'import' 声明。
      # 默认值：false
      import-require-single-import: false
      # 要求使用分组的 'import' 声明。
      # 默认值：false
      import-require-grouping: false

      # 要求仅使用单个全局 'type' 声明。
      # 默认值：false
      type-require-single-type: false
      # 要求使用分组的全局 'type' 声明。
      # 默认值：false
      type-require-grouping: false

      # 要求仅使用单个全局 'var' 声明。
      # 默认值：false
      var-require-single-var: false
      # 要求使用分组的全局 'var' 声明。
      # 默认值：false
      var-require-grouping: false

    iface:
      # 分析器列表。
      # 默认值：["identical"]
      enable:
        - identical # 识别同一包中具有相同方法集的接口。
        - unused # 识别在定义接口的同一包中任何地方都未被使用的接口。
        - opaque # 识别返回接口但实际返回值始终是单个具体实现的函数。
        - unexported # 识别未导出但用于导出函数或方法中的接口。
      settings:
        unused:
          # 要从检查中排除的包路径列表。
          # 默认值：[]
          exclude:

    # import导包别名设置
    importas:
      # 不允许对已设置别名的包进行无别名导入。
      # 默认值：false
      no-unaliased: false
      # 不允许非必需的别名。
      # 默认值：false
      no-extra-aliases: false
      # 别名列表。
      # 默认值：[]
      alias:

    inamedparam:
      # 跳过对只有单个参数的接口方法的检查。
      # 默认值：false
      skip-single-param: true

    ineffassign:
      # 检查 error 类型的逃逸变量，可能产生误报。
      # 默认值：false
      check-escaping-errors: true

    # 接口定义允许的最大方法数
    interfacebloat:
      # 接口允许的最大方法数。
      # 默认值：10
      max: 5

    iotamixing:
      # 是否报告单个常量而不仅是常量块。
      # 默认值：false
      report-individual: true

    ireturn:
      # 允许的接口列表。
      # 可以使用与接口或包名匹配的关键字和正则表达式列表。
      # `allow` 和 `reject` 设置不能同时使用。
      #
      # 关键字：
      # - `empty` 表示 `interface{}`
      # - `error` 表示 error
      # - `stdlib` 表示标准库
      # - `anon` 表示匿名接口
      # - `generic` 表示 go 1.18 中添加的泛型接口
      #
      # 默认值：[anon, error, empty, stdlib]
      allow:
        - anon
        - error
        - empty
        - stdlib
        - (or|er)$  # 你可以为接口指定惯用结尾

      # 要拒绝的接口列表。
      # 可以使用与接口或包名匹配的关键字和正则表达式列表。
      # `allow` 和 `reject` 设置不能同时使用。
      #
      # 关键字：
      # - `empty` 表示 `interface{}`
      # - `error` 表示 error
      # - `stdlib` 表示标准库
      # - `anon` 表示匿名接口
      # - `generic` 表示 go 1.18 中添加的泛型接口
      #
      # 默认值：[]
      reject:
        # - github.com\/user\/package\/v4\.Type

    lll:
      # 最大行长度，超过此长度的行将被报告。
      # 默认情况下 '\t' 计为 1 个字符，可以通过 tab-width 选项更改。
      # 默认值：120.
      line-length: 120
      # 制表符宽度（以空格为单位）。
      # 默认值：1
      tab-width: 1

    loggercheck:
      # 允许检查 github.com/go-kit/log 库。
      # 默认值：true
      kitlog: true
      # 允许检查 k8s.io/klog/v2 库。
      # 默认值：true
      klog: true
      # 允许检查 github.com/go-logr/logr 库。
      # 默认值：true
      logr: true
      # 允许检查 log/slog 库。
      # 默认值：true
      slog: true
      # 允许检查 go.uber.org/zap 库中的 "sugar logger"。
      # 默认值：true
      zap: true
      # 要求所有日志键为内联常量字符串。
      # 默认值：false
      require-string-key: false
      # 要求不出现 printf 类格式说明符（如 %s、%d）。
      # 默认值：false
      no-printf-like: true
      # 要检查的自定义规则列表，每条规则是一个单一的 logger 模式，适用于包装的 logger。
      # 例如：https://github.com/timonwong/loggercheck/blob/7395ab86595781e33f7afba27ad7b55e6956ebcd/testdata/custom-rules.txt
      # 默认值：空
      rules:

    # 根据代码复杂度等多个指标计算一个可维护性指数
    maintidx:
      # 显示可维护性指数低于 N 的函数。
      # 高指数表示更好的可维护性（与复杂度相反）。
      # 默认值：20
      under: 20

    makezero:
      # 仅允许以零长度初始化的切片。
      # 默认值：false
      always: false

    # 单词拼写
    misspell:
      # 使用 US 或 UK 的区域设置来纠正拼写。
      # 将区域设置为 US 会将英式拼写 'colour' 纠正为 'color'。
      # 默认使用中性英语变体。
      locale: US
      # 要忽略的拼写错误。
      # 应为小写。
      # 默认值：[]
      ignore-rules:

      # 额外的单词纠正。
      # `typo` 和 `correction` 应仅包含字母。
      # 单词不区分大小写。
      # 默认值：[]
      extra-words:
        - typo: "iff"
          correction: "if"
        - typo: "cancelation"
          correction: "cancellation"
      # 分析模式：
      # - default：检查所有文件内容。
      # - restricted：仅检查注释。
      # 默认值：""
      mode: restricted

    # mnd(Magic Number Detector) 代码中不应该直接出现意义不明的数字字面量，而应该使用具名常量。
    mnd:
      # 启用的检查列表，参见 https://github.com/tommy-muehle/go-mnd/#checks 了解描述。
      # 默认值：["argument", "case", "condition", "operation", "return", "assign"]
      checks:
  
      # 要从分析中排除的数字列表。
      # 数字应以字符串形式书写。
      # 始终忽略的值："1"、"1.0"、"0" 和 "0.0"。
      # 默认值：[]
      ignored-numbers:
  
      # 要从分析中排除的文件模式列表。
      # 始终忽略的值：`.+_test.go`。
      # 默认值：[]
      ignored-files:

      # 要从分析中排除的函数模式列表。
      # 以下函数始终被忽略：`time.Date`、
      # `strconv.FormatInt`、`strconv.FormatUint`、`strconv.FormatFloat`、
      # `strconv.ParseInt`、`strconv.ParseUint`、`strconv.ParseFloat`。
      # 默认值：[]
      ignored-functions:

    # 代码升级现代化设置
    modernize:
      # 要禁用的分析器列表。
      # 默认情况下，所有分析器均已启用。
      disable:    

    # 检查结构体是否有tag标签值。
    musttag:
      # 除了内置函数外，要检查的一组自定义函数。
      # 默认值：json, xml, gopkg.in/yaml.v3, BurntSushi/toml, mitchellh/mapstructure, jmoiron/sqlx
      functions:
        # 函数的完整名称，包括包名。
        - name: github.com/hashicorp/hcl/v2/hclsimple.DecodeFile
          # 应确保存在的结构体标签。
          tag: hcl
          # 要检查的参数位置。
          arg-pos: 2

    nakedret:
      # 如果函数代码行数超过此设置且有裸返回，则产生问题。
      # 默认值：30
      max-func-lines: 30

    # 控制 if 语句的复杂性
    nestif:
      # 报告的 if 语句最小复杂度。
      # 默认值：5
      min-complexity: 5

    nilnil:
      # 检查仅有两个返回值的函数（`return nil, nil`）。
      # 如果禁用，则支持 `return nil, nil, ..., nil` 形式的返回。
      # 默认值：true
      only-two: true
      # 此外，检测相反情况（同时返回非 nil error 和有效值）。
      # 例如，`return clone, fh.indexer.Update(clone)` 将被视为无效。
      # 默认值：false
      detect-opposite: false
      # 要检查的返回类型列表。
      # 默认值：["chan", "func", "iface", "map", "ptr", "uintptr", "unsafeptr"]
      checked-types:

    # 在 return 语句前增加一个空行（newline before return）。
    # 注意此规则和wsl_5有冲突使用要注意。
    nlreturn:
      # 块的大小（包括仍为"OK"的 return 语句），
      # 因此不需要拆分 return。
      # 默认值：1
      block-size: 1

    nolintlint:
      # 禁用以确保所有 nolint 指令实际生效。
      # 默认值：false
      allow-unused: true
      # 从需要解释的要求中排除以下 linter。
      # 默认值：[]
      allow-no-explanation: []
      # 启用以要求每个 nolint 指令后必须有非零长度的解释。
      # 默认值：false
      require-explanation: true
      # 启用以要求 nolint 指令提及被抑制的具体 linter。
      # 默认值：false
      require-specific: true

    nonamedreturns:
      # 如果命名 error 在 defer 中被赋值则报告。
      # 默认值：false
      report-error-in-defer: false

    paralleltest:
      # 忽略缺失的 `t.Parallel()` 调用，仅报告其不正确使用。
      # 默认值：false
      ignore-missing: true
      # 忽略子测试中缺失的 `t.Parallel()` 调用。
      # 顶层测试仍需要 `t.Parallel`，
      # 但子测试可以跳过。
      # 默认值：false
      ignore-missing-subtests: true
      # 检查 `defer` 是否未与 `t.Parallel` 一起使用。
      # （改用 `t.Cleanup` 以确保清理在并行子测试完成后运行）。
      # 默认值：false
      check-cleanup: true

    perfsprint:
      # 启用/禁用整数格式化的优化。
      # 默认值：true
      integer-format: true
      # 即使需要 int 或 uint 类型转换也进行优化。
      # 默认值：true
      int-conversion: true
      # 启用/禁用 error 格式化的优化。
      # 默认值：true
      error-format: true
      # 即使仅对非 nil error 等效，也优化为 `err.Error()`。
      # 默认值：false
      err-error: true
      # 优化 `fmt.Errorf`。
      # 默认值：true
      errorf: true
      # 启用/禁用字符串格式化的优化。
      # 默认值：true
      string-format: true
      # 优化只有一个参数的 `fmt.Sprintf`。
      # 默认值：true
      sprintf1: true
      # 优化为字符串拼接。
      # 默认值：true
      strconcat: true
      # 启用/禁用 bool 格式化的优化。
      # 默认值：true
      bool-format: true
      # 启用/禁用十六进制格式化的优化。
      # 默认值：true
      hex-format: true
      # 启用/禁用拼接循环的优化。
      # 默认值：true
      concat-loop: true
      # 即使有其他操作也优化 `concat-loop`。
      # 默认值：false
      loop-other-ops: true

    # 切片预分配控制减少扩容
    prealloc:
      # 重要：不建议在性能分析之前使用此 linter。
      # 对于大多数程序，使用 prealloc 会是过早优化。

      # 仅对没有 returns/breaks/continues/gotos 的简单循环报告预分配建议。
      # 默认值：true
      simple: true
      # 对 range 循环报告预分配建议。
      # 默认值：true
      range-loops: true
      # 对 for 循环报告预分配建议。
      # 默认值：false
      for-loops: false

    # 不要使用 Go 内置的关键标识符名称作为变量、函数、类型、常量名，否则会覆盖（遮蔽）原本的含义，降低代码可读性。
    predeclared:
      # 不报告的预声明标识符列表。
      # 默认值：[]
      ignore:
      # 在检查中包含方法名和字段名。
      # 默认值：false
      qualified-name: false

    promlinter:
      # Promlinter 无法在静态分析中推断所有指标名称。
      # 启用严格模式还将包括因解析参数失败而导致的错误。
      # 默认值：false
      strict: true
      # 详细用法请参见 https://github.com/yeya24/promlinter#usage。
      # 默认值：[]
      disabled-linters:

    protogetter:
      # 跳过由指定生成器生成的文件的检查。
      # 仅检查文件的初始注释，该注释必须遵循格式："// Code generated by <generator-name>"。
      # 由 protoc-gen-go、protoc-gen-go-grpc 和 protoc-gen-grpc-gateway 生成的文件始终自动排除。
      # 默认值：[]
      skip-generated-by: []
      # 跳过匹配指定 glob 模式的文件的检查。
      # 默认值：[]
      skip-files:
    
      # 跳过任何生成文件的检查。
      # 默认值：false
      skip-any-generated: false
      # 跳过 append 函数的第一个参数。
      # 默认值：false
      replace-first-arg-in-append: false

    reassign:
      # 检查重新赋值的全局变量名模式。
      # 参见 https://github.com/curioswitch/go-reassign#usage
      # 默认值：["EOF", "Err.*"]
      patterns:

    recvcheck:
      # 禁用内置方法排除：
      # - `MarshalText`
      # - `MarshalJSON`
      # - `MarshalYAML`
      # - `MarshalXML`
      # - `MarshalBinary`
      # - `GobEncode`
      # 默认值：false
      disable-builtin: false
      # 用户自定义方法排除。
      # 格式为 `struct_name.method_name`（例如：`Foo.MethodName`）。
      # 可以使用通配符 `*` 作为结构体名（例如：`*.MethodName`）。
      # 默认值：[]
      exclusions:

    revive:
      # 同时打开的最大文件数。
      # 参见 https://github.com/mgechev/revive#command-line-flags
      # 默认无限制。
      max-open-files: 2048

      # 设置默认严重程度。
      # 参见 https://github.com/mgechev/revive#configuration
      # 默认值：warning
      severity: warning

      # 启用所有可用规则。
      # 默认值：false
      enable-all-rules: false

      # 默认情况下，默认规则已启用，
      # 但如果显式定义或配置了某条规则，默认规则将被禁用。
      # 此选项设置为 `true` 时，允许在添加规则时避免显式重新定义默认规则。
      # 默认值：false
      enable-default-rules: false

      # 启用注释指令的验证。
      # 参见 https://github.com/mgechev/revive#comment-directives
      directives:
        - name: specify-disable-reason
          severity: error

      # 设置默认失败置信度。
      # 这意味着置信度低于 0.8 的 lint 错误将被忽略。
      # 默认值：0.8
      confidence: 0.1
      # Revive 处理默认规则的方式可能出乎意料：
      # - 如果没有显式规则，则使用默认规则。
      # - 如果至少有一条显式规则，则不使用默认规则，除非 `enable-default-rules` 为 `true`。
      # 运行 `GL_DEBUG=revive golangci-lint run --enable-only=revive` 查看默认、所有可用和已启用的规则。
      rules:
   
    rowserrcheck:
      # database/sql 始终被检查。
      # 默认值：[]
      packages:
        - github.com/jmoiron/sqlx

    # 标准库slog设置
    sloglint:
      # 报告全局 logger 的使用。
      # https://github.com/go-simpler/sloglint#no-global-logger
      # 可选值："all"、"default"
      # 默认值：""
      no-global: "all"
      # 报告不带 context.Context 的函数使用。
      # https://github.com/go-simpler/sloglint#context-only
      # 可选值："all"、"scope"
      # 默认值：""
      context: "all"
      # 报告动态日志消息，例如使用 fmt.Sprintf 构建的消息。
      # https://github.com/go-simpler/sloglint#static-message
      # 默认值：false
      static-msg: true
      # 报告不匹配特定风格的日志消息。
      # https://github.com/go-simpler/sloglint#message-style
      # 可选值："lowercased"、"capitalized"
      # 默认值：""
      msg-style: "lowercased"
      # 报告在单个函数调用中同时使用键值对和属性的情况。
      # https://github.com/go-simpler/sloglint#no-mixed-arguments
      # 默认值：true
      no-mixed-args: true
      # 报告将属性用作函数调用参数的情况。
      # https://github.com/go-simpler/sloglint#key-value-pairs-only
      # 默认值：false
      kv-only: false
      # 报告将键值对用作函数调用参数的情况。
      # https://github.com/go-simpler/sloglint#attributes-only
      # 默认值：false
      attr-only: false
      # 报告同一行上有两个或更多参数的情况。
      # https://github.com/go-simpler/sloglint#arguments-on-separate-lines
      # 默认值：false
      args-on-sep-lines: false
      # 报告将字符串字面量用作日志键的情况。
      # https://github.com/go-simpler/sloglint#constant-keys
      # 默认值：false
      no-raw-keys: false
      # 报告使用未显式允许的日志键。
      # https://github.com/go-simpler/sloglint#allowed-keys
      # 默认值：[]
      allowed-keys:
      # 报告使用被禁止的日志键。
      # https://github.com/go-simpler/sloglint#forbidden-keys
      # 默认值：[]
      forbidden-keys:
        - key
        - password
        - phone
        - screct
      # 报告不匹配特定命名大小写的日志键。
      # https://github.com/go-simpler/sloglint#key-naming-case
      # 可选值："snake"、"kebab"、"camel"、"pascal"
      # 默认值：""
      key-naming-case: "snake"
      # 除了标准 log/slog 函数外，分析自定义函数。
      # https://github.com/go-simpler/sloglint#custom-function-analysis
      # 默认值：[]
      custom-funcs:
          # 函数的完整名称，包括包名，例如 "log/slog.Info"。
          # 如果函数是方法，接收者类型必须用括号包裹，例如 "(*log/slog.Logger).Info"。
        - name: "(*golang.org/x/exp/slog.Logger).InfoContext"
          # 函数签名中 "msg string" 参数的位置，从 0 开始。
          # 如果函数中没有消息，则必须传递负值。
          msg-pos: 1
          # 函数签名中 "args ...any" 参数的位置，从 0 开始。
          # 如果函数中没有参数，则必须传递负值。
          args-pos: 2

    # opentelemetry和opencensus 检测设置。
    spancheck:
      # 要启用的检查。
      # 可选选项包括：
      # - `end`：检查是否调用了 `span.End()`
      # - `record-error`：检查返回 error 时是否调用了 `span.RecordError(err)`
      # - `set-status`：检查返回 error 时是否调用了 `span.SetStatus(codes.Error, msg)`
      # 默认值：["end"]
      checks:

      # 函数签名的正则表达式列表，如果在返回 error 的调用路径中发现这些签名，
      # 则抑制 `record-error` 和 `set-status` 的报告。
      # https://github.com/jjti/go-spancheck#ignore-check-signatures
      # 默认值：[]
      ignore-check-signatures:
       
      # 创建 span 的附加函数签名的正则表达式列表。
      # 如果你有创建 span 的工具方法则很有用。
      # 每个条目格式应为 `<regex>:<telemetry-type>`，其中 `telemetry-type` 可以是 `opentelemetry` 或 `opencensus`。
      # https://github.com/jjti/go-spancheck#extra-start-span-signatures
      # 默认值：[]
      extra-start-span-signatures:

    # 静态检查
    staticcheck:
      # https://staticcheck.dev/docs/configuration/options/#dot_import_whitelist
      # 默认值：["github.com/mmcloughlin/avo/build", "github.com/mmcloughlin/avo/operand", "github.com/mmcloughlin/avo/reg"]
      dot-import-whitelist:
        - fmt
      # https://staticcheck.dev/docs/configuration/options/#initialisms
      # 默认值：["ACL", "API", "ASCII", "CPU", "CSS", "DNS", "EOF", "GUID", "HTML", "HTTP", "HTTPS", "ID", "IP", "JSON", "QPS", "RAM", "RPC", "SLA", "SMTP", "SQL", "SSH", "TCP", "TLS", "TTL", "UDP", "UI", "GID", "UID", "UUID", "URI", "URL", "UTF8", "VM", "XML", "XMPP", "XSRF", "XSS", "SIP", "RTP", "AMQP", "DB", "TS"]
      initialisms: [ "ACL", "API", "ASCII", "CPU", "CSS", "DNS", "EOF", "GUID", "HTML", "HTTP", "HTTPS", "ID", "IP", "JSON", "QPS", "RAM", "RPC", "SLA", "SMTP", "SQL", "SSH", "TCP", "TLS", "TTL", "UDP", "UI", "GID", "UID", "UUID", "URI", "URL", "UTF8", "VM", "XML", "XMPP", "XSRF", "XSS", "SIP", "RTP", "AMQP", "DB", "TS" ]
      # https://staticcheck.dev/docs/configuration/options/#http_status_code_whitelist
      # 默认值：["200", "400", "404", "500"]
      http-status-code-whitelist: [ "200", "400", "404", "500" ]
      # SAxxxx 检查参见 https://staticcheck.dev/docs/configuration/options/#checks
      # 示例（禁用某些检查）：[ "all", "-SA1000", "-SA1001"]
      # 运行 `GL_DEBUG=staticcheck golangci-lint run --enable=staticcheck` 查看所有可用检查和配置启用的检查。
      # 默认值：["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
      checks: ["all"]

    # 结构体tag标签格式化
    tagalign:
      # align 和 sort 可以一起或单独使用。
      #
      # 是否启用对齐。如果为 true，结构体标签将被对齐。
      # 例如：
      # type FooBar struct {
      #     Bar    string `json:"bar" validate:"required"`
      #     FooFoo int8   `json:"foo_foo" validate:"required"`
      # }
      # 将被格式化为：
      # type FooBar struct {
      #     Bar    string `json:"bar"     validate:"required"`
      #     FooFoo int8   `json:"foo_foo" validate:"required"`
      # }
      # 默认值：true.
      align: false
      # 是否启用标签排序。
      # 如果为 true，标签将按名称升序排序。
      # 例如：`xml:"bar" json:"bar" validate:"required"` -> `json:"bar" validate:"required" xml:"bar"`。
      # 默认值：true
      sort: true
      # 指定标签顺序，其他标签将按名称排序。
      # 如果 `sort` 为 false，此选项将被忽略。
      # 默认值：[]
      order:
        - json
        - yaml
        - yml
        - toml
        - mapstructure
        - binding
        - validate
      # 是否启用严格样式。
      # 在此样式中，标签将按字典顺序排序和对齐，
      # 并且同名标签将在一起对齐。
      # 注意：如果 'align' 或 'sort' 为 false，此选项将被忽略。
      # 默认值：false
      strict: false

    # 确保结构体字段的标签（如 json:"userName"）遵循统一的命名风格（例如驼峰式 goCamel、蛇形 snake 等）
    tagliatelle:
      # 检查结构体标签名称的大小写。
      case:
        # 定义标签名和大小写之间的关联。
        # 可以使用任何结构体标签名。
        # 支持的字符串大小写：
        # - `camel`
        # - `pascal`
        # - `kebab`
        # - `snake`
        # - `upperSnake`
        # - `goCamel`
        # - `goPascal`
        # - `goKebab`
        # - `goSnake`
        # - `upper`
        # - `lower`
        # - `header`
        rules:
          json: camel
          yaml: camel
          xml: camel
          toml: camel
          bson: camel
          avro: snake
          mapstructure: kebab
          env: upperSnake
          envconfig: upperSnake
          whatever: snake
        # 定义标签名和大小写之间的关联。
        # 重要：`extended-rules` 会覆盖 `rules`。
        # 默认值：空
        extended-rules:
          json:
            # 支持的字符串大小写：
            # - `camel`
            # - `pascal`
            # - `kebab`
            # - `snake`
            # - `upperSnake`
            # - `goCamel`
            # - `goPascal`
            # - `goKebab`
            # - `goSnake`
            # - `header`
            # - `lower`
            # - `header`
            #
            # 必填
            case: camel
            # 将 'AMQP'、'DB'、'GID'、'RTP'、'SIP'、'TS' 添加到首字母缩略词，
            # 并从首字母缩略词中移除 'LHS'、'RHS'。
            # 默认值：false
            extra-initialisms: false
            # 定义首字母缩略词的添加和覆盖。
            # 默认值：[] 空
            initialism-overrides:
            
        # 使用结构体字段名检查结构体标签名。
        # 默认值：false
        use-field-name: false
        # 要忽略的字段名。
        # 默认值：[]
        ignored-fields:
        # 覆盖默认/根配置。
        # 默认值：[]
        overrides:

    # github.com/stretchr/testify 检查
    testifylint:
      # 启用所有检查器 (https://github.com/Antonboom/testifylint#checkers)。
      # 按名称启用检查器
      # （除默认外
      #   blank-import, bool-compare, compares, contains, empty, encoded-compare, equal-values, error-is-as, error-nil,
      #   expected-actual, go-require, float-compare, formatter, len, negative-positive, nil-compare, regexp, require-error,
      #   suite-broken-parallel, suite-dont-use-pkg, suite-extra-assert-call, suite-subtest-run, suite-method-signature,
      #   useless-assert
      # )。
      # 默认值：false
      enable-all: true
      # 按名称禁用检查器
      # （除默认外
      #   suite-thelper
      # )。
      disable:
        - error-is-as # 解决Errorf变成了ErrorIsf问题

      bool-compare:
        # 忽略用户自定义类型（而非内置 bool）。
        # 默认值：false
        ignore-custom-types: false
      expected-actual:
        # 期望变量名的正则表达式。
        # 默认值：(^(exp(ected)?|want(ed)?)([A-Z]\w*)?$)|(^(\w*[a-z])?(Exp(ected)?|Want(ed)?)$)
        pattern: ^expected
      formatter:
        # 启用 go vet 的 printf 检查。
        # 默认值：true
        check-format-string: true
        # 如果使用了格式字符串，要求使用 f 断言（如 `assert.Equalf`），即使没有可变长度
        # 变量，即在这两种情况下都要求使用 `require.NoErrorf`：
        # - require.NoErrorf(t, err, "unexpected error")
        # - require.NoErrorf(t, err, "unexpected error for sid: %v", sid)
        # 要理解此行为，请阅读
        # https://github.com/Antonboom/testifylint?tab=readme-ov-file#historical-reference-of-formatter.
        # 默认值：false
        require-f-funcs: false
        # 要求 msgAndArgs 的第一个元素 (msg) 为字符串类型。
        # 例如，在这种情况下，`assert.True(t, b, tt.case)` 这样的断言将被视为无效。
        # 默认值：true
        require-string-msg: true
      go-require:
        # 忽略 HTTP 处理器（如 http.HandlerFunc）。
        # 默认值：false
        ignore-http-handlers: false
      require-error:
        # 要分析的断言的正则表达式。如果定义，则仅报告匹配的 error 断言。
        # 默认值：""
        fn-pattern: ""
      suite-extra-assert-call:
        # 要求还是移除额外的 Assert() 调用？
        # 默认值：remove
        mode: remove

    # 检查 Go 测试文件 package 声明是否合理
    testpackage:
      # 跳过文件的正则表达式模式。
      # 默认值："(export|internal)_test\\.go"
      skip-regexp: (export|internal)_test\.go
      # 允许测试所在的不以 _test 结尾的包列表。
      # 默认值："main"
      allow-packages:
        - main

    # 测试用例配置
    thelper:
      test:
        # 检查 *testing.T 是否为辅助函数的第一个参数（或在 context.Context 之后）。
        # 默认值：true
        first: true
        # 检查 *testing.T 参数是否名为 t。
        # 默认值：true
        name: true
        # 检查 t.Helper() 是否位于辅助函数开头。
        # 默认值：true
        begin: true
      benchmark:
        # 检查 *testing.B 是否为辅助函数的第一个参数（或在 context.Context 之后）。
        # 默认值：true
        first: true
        # 检查 *testing.B 参数是否名为 b。
        # 默认值：true
        name: true
        # 检查 b.Helper() 是否位于辅助函数开头。
        # 默认值：true
        begin: true
      tb:
        # 检查 *testing.TB 是否为辅助函数的第一个参数（或在 context.Context 之后）。
        # 默认值：true
        first: true
        # 检查 *testing.TB 参数是否名为 tb。
        # 默认值：true
        name: true
        # 检查 tb.Helper() 是否位于辅助函数开头。
        # 默认值：true
        begin: true
      fuzz:
        # 检查 *testing.F 是否为辅助函数的第一个参数（或在 context.Context 之后）。
        # 默认值：true
        first: true
        # 检查 *testing.F 参数是否名为 f。
        # 默认值：true
        name: true
        # 检查 f.Helper() 是否位于辅助函数开头。
        # 默认值：true
        begin: true

    # 标准库变量使用限制
    usestdlibvars:
      # 建议使用 http.MethodXX。
      # 默认值：true
      http-method: true
      # 建议使用 http.StatusXX。
      # 默认值：true
      http-status-code: true
      # 建议在 time.Date 中使用 time.Month。
      # 默认值：false
      time-date-month: false
      # 建议使用 time.Weekday.String()。
      # 默认值：true
      time-weekday: true
      # 建议使用 time.Month.String()。
      # 默认值：false
      time-month: false
      # 建议使用 time.Layout。
      # 默认值：false
      time-layout: false
      # 建议使用 crypto.Hash.String()。
      # 默认值：false
      crypto-hash: false
      # 建议使用 rpc.DefaultXXPath。
      # 默认值：false
      default-rpc-path: false
      # 建议使用 sql.LevelXX.String()。
      # 默认值：false
      sql-isolation-level: false
      # 建议使用 tls.SignatureScheme.String()。
      # 默认值：false
      tls-signature-scheme: false
      # 建议使用 constant.Kind.String()。
      # 默认值：false
      constant-kind: false

    usetesting:
      # 启用/禁用 `os.CreateTemp("", ...)` 检测。
      # 默认值：true
      os-create-temp: true

      # 启用/禁用 `os.MkdirTemp()` 检测。
      # 默认值：true
      os-mkdir-temp: true

      # 启用/禁用 `os.Setenv()` 检测。
      # 默认值：true
      os-setenv: true

      # 启用/禁用 `os.TempDir()` 检测。
      # 默认值：false
      os-temp-dir: false

      # 启用/禁用 `os.Chdir()` 检测。
      # 如果 Go < 1.24 则禁用。
      # 默认值：true
      os-chdir: true

      # 启用/禁用 `context.Background()` 检测。
      # 如果 Go < 1.24 则禁用。
      # 默认值：false
      context-background: false

      # 启用/禁用 `context.TODO()` 检测。
      # 如果 Go < 1.24 则禁用。
      # 默认值：false
      context-todo: false

    unconvert:
      # 移除强制中间舍入的转换。
      # 默认值：false
      fast-math: true
      # 更加保守（实验性）。
      # 默认值：false
      safe: true

    # 找出函数中"没有实际作用"的参数（parameter）和返回值（return value）。
    unparam:
      # 检查导出函数。
      # 如果没有外部程序/库导入你的代码则设为 true。
      #
      # 重要：如果启用此设置，unparam 在文本编辑器中会报告许多误报：
      # 在子目录上运行时无法找到外部接口。
      # 大多数编辑器集成在包含已更改文件的目录上调用 golangci-lint。
      #
      # 默认值：false
      check-exported: false

    # SQL语句构建、查询限制
    unqueryvet:
      # 启用 SQL 构建器检查。
      # 默认值：true
      check-sql-builders: true
      # 启用别名通配符检测，如 `SELECT t.*`。
      # 默认值：true
      check-aliased-wildcard: true
      # 启用字符串拼接分析。
      # 默认值：true
      check-string-concat: true
      # 启用格式字符串分析，如 `fmt.Sprintf`。
      # 默认值：true
      check-format-strings: true
      # 启用 strings.Builder 分析。
      # 默认值：true
      check-string-builder: true
      # 启用子查询分析。
      # 默认值：true
      check-subqueries: true
      # 检测 N+1 查询。
      # 默认值：false
      check-n1: true
      # 检测 SQL 注入。 注意容易误报例如http Get请求
      # 默认值：false
      check-sql-injection: false
      # 检测事务泄漏。
      # 默认值：false
      check-tx-leaks: true
      # 可接受的 `SELECT *` 用法的正则表达式模式。
      # 默认值：
      # - "SELECT \\* FROM information_schema\\..*"
      # - "SELECT \\* FROM pg_catalog\\..*"
      # - "SELECT COUNT\\(\\*\\)"
      # - "SELECT MAX\\(\\*\\)"
      # - "SELECT MIN\\(\\*\\)"
      allowed-patterns:
      
      # allow 是允许的 SQL 模式列表（白名单）。
      # 默认值：[]
      allow:
    
      # 要忽略的函数（正则表达式模式）
      # 默认值：[]
      ignored-functions:

      # 要检查的 SQL 构建器库。
      # 默认值：全部为 true。
      sql-builders:
        squirrel: true
        gorm: true
        sqlx: true
        ent: true
        pgx: true
        bun: true
        sqlboiler: true
        jet: true
      
      # 用户自定义 DSL 规则列表。
      # https://github.com/MirrexOne/unqueryvet?tab=readme-ov-file#custom-rules-dsl
      # 默认值：[]
      custom-rules:
        - id: allow-temp-tables
          pattern: "SELECT * FROM $TABLE"
          when: "isTempTable(table)"
          action: allow
        - id: dangerous-delete
          pattern: "DELETE FROM $TABLE"
          when: "!has_where"
          message: "DELETE without WHERE clause"

    # 未使用代码设置
    unused:
      # 将所有被写入的结构体字段标记为已使用。
      # 默认值：true
      field-writes-are-uses: true
      # 将 IncDec 语句（如 `i++` 或 `i--`）视为读写操作而不仅仅是写操作。
      # 默认值：false
      post-statements-are-reads: true
      # 将所有导出字段标记为已使用。
      # 默认值：true
      exported-fields-are-used: false
      # 将所有函数参数标记为已使用。
      # 默认值：true
      parameters-are-used: true
      # 将所有局部变量标记为已使用。
      # 默认值：true
      local-variables-are-used: true
      # 将生成文件中的所有标识符标记为已使用。
      # 默认值：true
      generated-is-used: true

    # 用于检查变量名的长度是否与其使用范围匹配
    varnamelen:
      # 被视为"小作用域"的最长距离（以源代码行计）。
      # 最多在此行数内使用的变量将被忽略。
      # 默认值：5
      max-distance: 5
      # 被视为"长"的变量名最小长度。
      # 至少为此长度的变量名将被忽略。
      # 默认值：3
      min-name-length: 2
      # 检查方法接收者。例如: func (s *Server) Run() {}
      # 默认值：false
      check-receiver: false
      # 检查命名返回值。
      # 默认值：false
      check-return: false
      # 检查类型参数。例如 func Map[T any](...)
      # 默认值：false
      check-type-param: false
      # 忽略持有类型断言 bool 返回值的 "ok" 变量。
      # 默认值：false
      ignore-type-assert-ok: false
      # 忽略持有 map 索引 bool 返回值的 "ok" 变量。
      # 默认值：false
      ignore-map-index-ok: false
      # 忽略持有 channel 接收 bool 返回值的 "ok" 变量。
      # 默认值：false
      ignore-chan-recv-ok: false
      # 应完全忽略的可选变量名列表。
      # 默认值：[]
      ignore-names:
        - ctx
        - err

      # 应完全忽略的可选变量声明列表。
      # 条目必须是以下形式之一（示例见下文）：
      # - 对于变量、参数、命名返回值、方法接收者或类型参数：
      #   <name> <type>  (<type> 也可以是 pointer/slice/map/chan/...)
      # - 对于常量：const <name>
      #
      # 默认值：[]
      ignore-decls:
        - c echo.Context
        - c gin.Context
        - t testing.T
        - b testing.B
        - m testing.M
        - e error
        - i int
        - r rune
        - b bool
        - s string
        - f float
        - T any
        - m map[string]string
        - const C
        - w http.ResponseWriter

    whitespace:
      # 在每个多行 if 语句之后强制添加换行符（或注释）。
      # 默认值：false
      multi-if: false
      # 会在每个多行函数签名之后强制添加换行符（或注释）。
      # 默认值：false
      multi-func: true

    # 错误包装检查器
    wrapcheck:
      # 指定要忽略的签名的附加子字符串数组。
      # 与 'ignore-sigs' 不同，此选项扩展默认集合（或 'ignore-sigs' 中指定的集合）而不是完全替换。
      # 这允许你将特定签名添加到忽略列表中
      # 同时保留默认值或 'ignore-sigs' 中的任何项。
      # 默认值：[]
      extra-ignore-sigs:

      # 指定要忽略的签名子字符串的字符串数组。
      # 如果设置此项，将覆盖默认的忽略签名集合。
      # 更多信息请参见 https://github.com/tomarrell/wrapcheck#configuration。
      # 默认值：[".Errorf(", "errors.New(", "errors.Unwrap(", "errors.Join(", ".Wrap(", ".Wrapf(", ".WithMessage(", ".WithMessagef(", ".WithStack("]
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
      # 指定要忽略的签名正则表达式的字符串数组。
      # 默认值：[]
      ignore-sig-regexps:
        - \.New.*Error\(
       
      # 指定要忽略的包 glob 模式的字符串数组。
      # 默认值：[]
      ignore-package-globs:
        - encoding/*
        - github.com/pkg/*
    
      # 指定要忽略的接口正则表达式的字符串数组。
      # 默认值：[]
      ignore-interface-regexps:
      
      # 决定 wrapcheck 是否应报告从包内部返回的错误。
      # 默认值：false
      report-internal-errors: true

    # 空格检查器(whitespace linter) 是一款代码检查工具，它鼓励你使用空行来分隔不同类型的代码块，以提高代码可读性.
    wsl_v5:
      # 如果变量首先在紧接的下一个块中使用，则允许紧挨声明，
      # 即使带块的语句不使用该变量。
      # https://github.com/bombsimon/wsl/tree/main?tab=readme-ov-file#configuration
      # 默认值：true
      allow-first-in-block: true

      # 与上述相同，
      # 但如果变量在以下（或嵌套）块中的任何位置使用，则允许紧挨声明。
      # https://github.com/bombsimon/wsl/tree/main?tab=readme-ov-file#configuration
      # 默认值：false
      allow-whole-block: false

      # 如果一个块包含超过此行数，
      # 分支语句需要用空行分隔。
      # https://github.com/bombsimon/wsl/tree/main?tab=readme-ov-file#configuration
      # 默认值：2
      branch-max-lines: 2

      # 如果设置为非负数，
      # case 块超过此数量时需要以空行结尾
      # https://github.com/bombsimon/wsl/tree/main?tab=readme-ov-file#configuration
      # 默认值：0
      case-max-lines: 0

      # 块语句、go、defer 和 send 上方允许的最大紧挨语句数。
      # 每个紧挨语句必须至少有一个变量在块中使用。
      # 遵循 allow-first-in-block 和 allow-whole-block。
      # 为 0 时完全不允许紧挨；每个紧挨检查触发器都需要在其上方有一个空行
      # 默认值：1
      cuddle-max-statements: 1

      # 使用的默认检查。
      # 可以是 `all`、`none`、`default` 或空。
      # https://github.com/bombsimon/wsl/tree/main?tab=readme-ov-file#checks-and-configuration
      # 默认值：""
      default: all

      # 启用的检查。
      # 将叠加到任何预设上。
      # https://github.com/bombsimon/wsl/tree/main?tab=readme-ov-file#checks-and-configuration
      # 默认值：[]
      enable:

      # 禁用的检查。
      # 将从任何预设中减去。
      # https://github.com/bombsimon/wsl/tree/main?tab=readme-ov-file#checks-and-configuration
      # 默认值：[]
      disable:
        - after-block
        - after-decl
        # - after-defer
        - after-expr
        - after-go
        - assign-exclusive
        - assign-expr
        - branch
        - cuddle-group
        - return

    # custom 部分可用于定义在运行时加载的 linter 插件。
    # 更多信息请参见 README 文档。
    custom:

  # 定义一组忽略问题的规则。
  # 它不会跳过分析，因此不会忽略 "typecheck" 错误。
  exclusions:
    # 生成文件分析的模式。
    #
    # - `strict`：严格遵循 Go 生成文件约定来排除源文件。
    #    只有行匹配以下正则表达式的源文件才会被排除：`^// Code generated .* DO NOT EDIT\.$`
    #    此行必须出现在文件中第一个非注释、非空白文本之前。
    #    https://go.dev/s/generatedcode
    # - `lax`：如果源文件包含 `autogenerated file`、`code generated`、`do not edit` 等行，则被排除。
    # - `disable`：禁用生成文件排除。
    #
    # 默认值：strict
    generated: strict
    # 如果排除规则未使用则记录警告。
    # 默认值：false
    warn-unused: false
    # 预定义的排除规则。
    # 默认值：[]
    presets:

    # 按路径、linter、文本和来源排除配置。
    rules:
      - path: '_test\.go$'
        linters:
          - dogsled
          - dupl
          - unqueryvet

      - path: '(^|/)testdata/'
        linters:
          - dogsled
          - dupl
          - unqueryvet

      - path: '(^|/)vendor/'
        linters:
          - unqueryvet

      - path: '(^|/)mock_[^/]*\.go$'
        linters:
          - dogsled
          - dupl
          - unqueryvet

    # rules:
    #   # 排除部分 linter，不对测试文件运行它们。
    #   - path: _test\.go
    #     linters:
    #       - gocyclo
    #       - errcheck
    #       - dupl
    #       - gosec

    #   # 排除测试文件以外的相关问题，使部分 linter 仅对测试文件运行。
    #   - path-except: _test\.go
    #     linters:
    #       - forbidigo

    #   # 从部分硬编码引入的第三方代码中排除已知的 linter，
    #   # 因为无法通过 `nolint` 注释排除它们。
    #   # `/` 将替换为当前操作系统的文件路径分隔符，以便在 Windows 上正常工作。
    #   - path: internal/hmac/
    #     text: "weak cryptographic primitive"
    #     linters:
    #       - gosec

    #   # 排除部分 `staticcheck` 消息。
    #   - linters:
    #       - staticcheck
    #     text: "SA9003:"

    #   # 排除包含 `go:generate` 的长行所产生的 `lll` 问题。
    #   - linters:
    #       - lll
    #     source: "^//go:generate "

    # 要排除的文件路径：它们将被分析，但其中的问题不会被报告。
    # "/" 将被替换为当前操作系统的文件路径分隔符，以便在 Windows 上正常工作。
    # 默认值：[]
    paths:

    # 不排除的文件路径。
    # 默认值：[]
    paths-except:

formatters:
  # 启用特定的格式化工具。
  # 默认值：[] (uses standard Go formatting)
  enable:
    - gci
    - gofumpt # gofumpt兼容覆盖gofmt
    - goimports
    - golines
    - swaggo
    # - gofmt

  # 格式化工具设置。
  settings:
    # 配置代码导包格式  
    gci:
      # 要比较的分节配置。
      # 分节名称不区分大小写，可以包含 () 中的参数。
      # 分节的默认顺序为 `standard > default > custom > blank > dot > alias > localmodule`。
      # 如果 `custom-order` 为 `true`，则遵循 `sections` 选项的顺序。
      # 默认值：["standard", "default"]
      sections:
        - standard                       # 标准库分节：捕获所有标准库包。
        - default                        # 默认分节：包含所有无法匹配到其他分节类型的导入。
        - localmodule                    # 本地模块分节：包含所有本地包。除非显式启用，否则不显示此分节。

      # 检查是否存在行内注释。
      # 默认值：false
      no-inline-comments: true

      # 检查是否存在前缀注释（导入上方的注释行）。
      # 默认值：false
      no-prefix-comments: true

      # 启用自定义分节顺序。
      # 如果为 `true`，使分节顺序与 `sections` 的顺序相同。
      # 默认值：false
      custom-order: false

      # 对自定义分节取消字典序排序。
      # 默认值：false
      no-lex-order: false

    gofmt:
      # 简化代码：使用 `-s` 选项的 gofmt。
      # 默认值：true
      simplify: true
      # 在重新格式化之前将重写规则应用于源代码。
      # https://pkg.go.dev/cmd/gofmt
      # 默认值：[]
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
        - pattern: 'a[b:len(a)]'
          replacement: 'a[b:]'

    gofumpt:
      # 包含正在格式化的源代码的模块路径。
      # 默认值：""
      module-path: ""

      # 选择是否使用额外规则。
      # 默认值：false
      extra-rules: true

    goimports:
      # 前缀列表，如果设置，则检查导入路径
      # 给定前缀的导入是否在第三方包之后分组。
      # 默认值：[]
      local-prefixes:

    # 缩短过长的代码行。
    golines:
      # 目标最大行长度。
      # 默认值：100
      max-len: 200
      # 制表符长度。
      # 默认值：4
      tab-len: 4
      # 缩短单行注释。
      # 默认值：false
      shorten-comments: false
      # 默认值：true 注意和linters.settings.tagalign.align有冲突 
      reformat-tags: false
      # 在点号处而非参数处拆分链式方法调用。
      # 默认值：true
      chain-split-dots: true

  exclusions:
    # 如果排除路径未使用则记录警告。
    # 默认值：false
    warn-unused: false
    # 生成文件分析的模式。
    #
    # - `strict`：严格遵循 Go 生成文件约定来排除源文件。
    #    只有行匹配以下正则表达式的源文件才会被排除：`^// Code generated .* DO NOT EDIT\.$`
    #    此行必须出现在文件中第一个非注释、非空白文本之前。
    #    https://go.dev/s/generatedcode
    # - `lax`：如果源文件包含 `autogenerated file`、`code generated`、`do not edit` 等行，则被排除。
    # - `disable`：禁用生成文件排除。
    #
    # 默认值：lax
    generated: lax
    # 要排除的文件路径。
    # 使用 `--stdin` 时此选项被忽略，因为路径未知。
    # 默认值：[]
    paths:

# 控制 lint 结果如何过滤、统计、去重、增量检查以及自动修复。
issues:
  # 每个 linter 最多输出多少条 Issue。
  # 设为 0 以禁用。
  # 默认值：50
  max-issues-per-linter: 0

  # 相同文本问题的最大数量。
  # 设为 0 以禁用。
  # 默认值：3
  max-same-issues: 0

  # 按行使问题输出唯一。
  # 默认值：true
  uniq-by-line: true

  # 仅显示新问题：如果有未暂存的更改或未跟踪的文件，
  # 则仅分析这些更改，否则仅分析 HEAD~ 中的更改。
  # 这是将 golangci-lint 集成到现有大型代码库中的超级有用选项。
  # 在集成时修复所有现有问题是不切实际的：
  # 更好的做法是不允许新代码中出现问题。
  #
  # 默认值：false
  new: false

  # 仅显示在最佳公共祖先（HEAD 的 merge-base）之后创建的新问题。
  # 默认值：""
  new-from-merge-base: ""

  # 仅显示在 git 版本 `REV` 之后创建的新问题。
  # 默认值：""
  new-from-rev: ""

  # 仅显示在指定文件路径的 git patch 中创建的新问题。
  # 默认值：""
  new-from-patch: ""

  # 在更新文件的任何部分显示问题（需要 new-from-rev 或 new-from-patch）。
  # 默认值：false
  whole-files: false

  # 应用 linter 和格式化工具检测到的修复（如果 linter 支持）。
  # 默认值：false
  fix: false

# 输出配置选项。
output:
  # 用于渲染报告问题的格式。如果配置多种format都会输出，建议只配置一个。
  formats:
    # 以文本格式打印问题，带颜色、行号和 linter 名称。
    # 此格式是默认格式。
    text:
      # 输出路径可以是 `stdout`、`stderr` 或写入文件的路径。
      # 默认值：stdout
      path: stdout
      # 在问题文本末尾打印 linter 名称。
      # 默认值：true
      print-linter-name: true
      # 打印有问题的代码行。
      # 默认值：true
      print-issued-lines: true
      # 使用颜色。
      # 默认值：true
      colors: true
    # # 以 JSON 表示形式打印问题。
    # json:
    #   # 输出路径可以是 `stdout`、`stderr` 或写入文件的路径。
    #   # 默认值：stdout
    #   path: stdout
    # # 以制表符分隔的列表示形式打印问题。
    # tab:
    #   # 输出路径可以是 `stdout`、`stderr` 或写入文件的路径。
    #   # 默认值：stdout
    #   path: stdout
    #   # 在问题文本末尾打印 linter 名称。
    #   # 默认值：true
    #   print-linter-name: true
    #   # 使用颜色。
    #   # 默认值：true
    #   colors: true
    # # 在 HTML 页面中打印问题。
    # # 它使用 Cloudflare CDN (cdnjs) 和 React。
    # html:
    #   # 输出路径可以是 `stdout`、`stderr` 或写入文件的路径。
    #   # 默认值：stdout
    #   path: stdout
    # # 以 Checkstyle 格式打印问题。
    # checkstyle:
    #   # 输出路径可以是 `stdout`、`stderr` 或写入文件的路径。
    #   # 默认值：stdout
    #   path: stdout
    # # 以 Code Climate 格式打印问题。
    # code-climate:
    #   # 输出路径可以是 `stdout`、`stderr` 或写入文件的路径。
    #   # 默认值：stdout
    #   path: stdout
    # # 以 JUnit XML 格式打印问题。
    # junit-xml:
    #   # 输出路径可以是 `stdout`、`stderr` 或写入文件的路径。
    #   # 默认值：stdout
    #   path: stdout
    #   # 支持额外的 JUnit XML 字段。
    #   # 默认值：false
    #   extended: false
    # # 以 TeamCity 格式打印问题。
    # teamcity:
    #   # 输出路径可以是 `stdout`、`stderr` 或写入文件的路径。
    #   # 默认值：stdout
    #   path: stdout
    # # 以 SARIF 格式打印问题。
    # sarif:
    #   # 输出路径可以是 `stdout`、`stderr` 或写入文件的路径。
    #   # 默认值：stdout
    #   path: stdout

  # 为输出文件引用添加前缀。
  # 使用 `output.path-mode: abs` 模式时此选项被忽略。
  # 默认值：""
  path-prefix: ""

  # 默认情况下，报告与 `run.relative-path-mode` 获取的路径相关。
  # `abs` 模式允许显示绝对文件路径而非相对文件路径。
  # 使用 `abs` 模式时 `output.path-prefix` 选项被忽略。
  # 默认值：""
  path-mode: ""

  # 排序结果时使用的顺序。
  # 可选值：`file`、`linter` 和 `severity`。
  #
  # 如果严重程度值在以下列表中，则按此顺序排序：
  #   1. error
  #   2. warning
  #   3. high
  #   4. medium
  #   5. low
  # 否则按字母顺序排序。
  #
  # 默认值：["linter", "file"]
  sort-order:
    - linter
    - file # 文件路径、行和列。

  # 显示每个 linter 的统计信息。
  # 默认值：true
  show-stats: true

# 分析运行选项。
run:
  # 总工作超时时间，例如 30s、5m、5m30s。
  # 如果值小于等于 0，则禁用超时。
  # 默认值：0 (disabled)
  timeout: 10m

  # 用于评估相对路径的模式。
  # 被排除规则、Go 插件和某些 linter 使用。
  # 值可以是：
  # - `gomod`：路径将相对于 `go.mod` 文件所在的目录。
  # - `gitroot`：路径将相对于 git 根目录（`.git` 的父目录）。
  # - `cfg`：路径将相对于配置文件。
  # - `wd`（不推荐）：路径将相对于运行 golangci-lint 的位置。
  # 默认值：cfg
  relative-path-mode: cfg

  # 发现至少一个问题时的退出码。
  # 默认值：1
  issues-exit-code: 1

  # 是否包含测试文件。
  # 默认值：true
  tests: true

  # 构建标签列表，所有 linter 都使用它。
  # 默认值：[]
  build-tags:

  # 如果设置，我们将其传递给 "go list -mod={option}"。来自 "go help modules"：
  # 如果使用 -mod=readonly 调用，go 命令不允许进行上述隐式
  # 自动更新 go.mod。相反，当需要任何对 go.mod 的
  # 更改时它会失败。此设置最适合用于检查 go.mod 是否
  # 不需要更新，例如在持续集成和测试系统中。
  # 如果使用 -mod=vendor 调用，go 命令假定 vendor
  # 目录持有正确的依赖副本，并忽略
  # go.mod 中的依赖描述。
  #
  # 允许的值：readonly|vendor|mod
  # 默认值：""
  modules-download-mode: readonly

  # 在加载包时使用版本控制信息。
  # 默认值：false（等同于 `-buildvcs=false`）
  enable-build-vcs: false

  # 允许并行运行多个 golangci-lint 实例。
  # 如果为 false，golangci-lint 在启动时获取文件锁。
  # 默认值：false
  allow-parallel-runners: true

  # 允许运行多个 golangci-lint 实例，但通过锁串行化。
  # 如果为 false，golangci-lint 在启动时获取文件锁失败则以错误退出。
  # 默认值：false
  allow-serial-runners: false

  # 定义 Go 版本限制。
  # 默认值：使用 go.mod 文件中的 Go 版本；若无，则使用环境变量 `GOVERSION`；仍无则使用 1.22。
  go: ''

  # 可以同时执行 golangci-lint 的操作系统线程数（`GOMAXPROCS`）。
  # 默认值：0（自动设置为与 Linux 容器 CPU 配额匹配，并
  # 回退到机器的逻辑 CPU 数量）
  concurrency: 0

severity:
  # 为问题设置默认严重程度。
  #
  # 如果定义了严重程度规则但问题不匹配，或规则未提供严重程度，
  # 则应用此默认严重程度。
  # 严重程度应与所选输出格式支持的严重程度名称匹配。
  # - Code climate: https://docs.codeclimate.com/docs/issues#issue-severity
  # - Checkstyle: https://checkstyle.sourceforge.io/property_types.html#SeverityLevel
  # - GitHub: https://help.github.com/en/actions/reference/workflow-commands-for-github-actions#setting-an-error-message
  # - TeamCity: https://www.jetbrains.com/help/teamcity/service-messages.html#Inspection+Instance
  #
  # `@linter` 可用作严重程度值，以保留来自 linter（如 revive、gosec 等）的严重程度
  #
  # 默认值：""
  default: error

  # 当提供严重程度规则列表时，严重程度信息将被添加到 lint 问题中。
  # 严重程度规则具有与排除规则相同的过滤能力，
  # 但每个严重程度规则只允许指定一个匹配器。
  #
  # `@linter` 可用作严重程度值，以保留来自 linter（如 revive、gosec 等）的严重程度
  #
  # 仅影响支持设置严重程度信息的输出格式。
  #
  # 默认值：[]
  rules:
